name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Placeholders only — prisma generate parses the schema file and
      # doesn't need a live connection; next build doesn't prerender the
      # dynamic (auth-gated) routes either. These exist so nothing crashes
      # on an undefined env var, not because CI talks to a real database.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/devsync"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/devsync"
      AUTH_SECRET: "ci-placeholder-not-a-real-secret"
      AUTH_GOOGLE_ID: "ci-placeholder"
      AUTH_GOOGLE_SECRET: "ci-placeholder"
      GEMINI_API_KEY: "ci-placeholder"
      UPSTASH_REDIS_REST_URL: "https://ci-placeholder.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "ci-placeholder"
      NEXTAUTH_URL: "http://localhost:3000"
      AUTH_TRUST_HOST: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
